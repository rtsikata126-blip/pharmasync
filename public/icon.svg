<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Pill body -->
    <rect x="-80" y="-40" width="160" height="80" rx="40" fill="url(#pill)" stroke="#cbd5e1" stroke-width="3"/>
    <!-- Pill score line -->
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.6"/>
    <!-- Cross mark -->
    <path d="M-16,-4 L-4,-16 M4,-16 L16,-4 M16,4 L4,16 M-4,16 L-16,4" stroke="#2563eb" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>
</svg>
